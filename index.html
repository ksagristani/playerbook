<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayerBook</title>

<link rel="stylesheet" href="css/styles.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="app">

<header>

<div class="perfil">

<div class="foto">
KS
</div>

<div>

<h1>Kevin Nahuel Sagristani</h1>

<p>⚽ Delantero • Unión de Oncativo</p>

</div>

</div>

</header>

<section class="cards">

<div class="card">

<span>🏟️</span>

<h2 id="partidos">0</h2>

<p>Partidos</p>

</div>

<div class="card">

<span>⚽</span>

<h2 id="goles">0</h2>

<p>Goles</p>

</div>

<div class="card">

<span>🎯</span>

<h2 id="asistencias">0</h2>

<p>Asistencias</p>

</div>

<div class="card">

<span>🥅</span>

<h2 id="tiros">0</h2>

<p>Tiros</p>

</div>

<div class="card">

<span>🟨</span>

<h2 id="amarillas">0</h2>

<p>Amarillas</p>

</div>

<div class="card">

<span>🟥</span>

<h2 id="rojas">0</h2>

<p>Rojas</p>

</div>

</section>

<button id="btnNuevo">

➕ Nuevo Partido

</button>

<section class="historial">

<h2>Últimos partidos</h2>

<div id="listaPartidos">

<div class="empty">

Todavía no registraste partidos.

</div>

</div>

</section>

</div>

<div class="modal" id="modal">

<div class="modalBox">

<h2>Nuevo Partido</h2>

<input id="rival" placeholder="Rival">

<input id="resultado" placeholder="Resultado (Ej: 3-1)">

<label>⚽ Goles</label>
<input id="golesPartido" type="number" value="0">

<label>🎯 Asistencias</label>
<input id="asistenciasPartido" type="number" value="0">

<label>🥅 Tiros al arco</label>
<input id="tirosPartido" type="number" value="0">

<label>🟨 Tarjetas amarillas</label>
<input id="amarillasPartido" type="number" value="0">

<label>🟥 Tarjetas rojas</label>
<input id="rojasPartido" type="number" value="0">

<div class="acciones">

<button id="guardar">

Guardar Partido

</button>

<button id="cerrar">

Cancelar

</button>

</div>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
